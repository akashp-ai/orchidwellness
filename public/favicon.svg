<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Deep rose/plum background — matches new brand palette -->
  <rect width="64" height="64" rx="14" fill="#1B050F"/>
  <!-- Orchid flower: alternating gold & rose petals -->
  <g transform="translate(32,32)">
    <ellipse cx="0" cy="-12" rx="5" ry="9" fill="#C9A96E" opacity="0.95" transform="rotate(0)"/>
    <ellipse cx="0" cy="-12" rx="5" ry="9" fill="#D9608F" opacity="0.90" transform="rotate(72)"/>
    <ellipse cx="0" cy="-12" rx="5" ry="9" fill="#C9A96E" opacity="0.85" transform="rotate(144)"/>
    <ellipse cx="0" cy="-12" rx="5" ry="9" fill="#D9608F" opacity="0.85" transform="rotate(216)"/>
    <ellipse cx="0" cy="-12" rx="5" ry="9" fill="#C9A96E" opacity="0.90" transform="rotate(288)"/>
    <!-- Centre -->
    <circle cx="0" cy="0" r="5" fill="#E8BC72"/>
    <circle cx="0" cy="0" r="2.5" fill="#FAF8F5"/>
  </g>
</svg>
